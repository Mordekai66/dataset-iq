name: Generate Dataset Stats

on:
  push:
    paths:
      - "data/ml/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas openpyxl scikit-learn

      - name: Run stats generation
        run: python -c "from core.stats import run_all; run_all()"

      - name: Commit generated stats
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/ml/*.json
          git commit -m "Auto-generate dataset stats" || echo "No changes"
          git push
